name: Mobile Release

on:
  push:
    tags:
      - "mobile-v*"
    branches:
      - main
    paths:
      # Native config / version changes need a fresh APK (JS-only changes go
      # through the OTA workflow instead). Touching any of these on main
      # triggers a cloud build automatically.
      - "mobile/app.json"
      - "mobile/package.json"
      - "mobile/eas.json"
      - "mobile/google-services.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Build preview APK (cloud)
        run: eas build --profile preview --platform android --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
