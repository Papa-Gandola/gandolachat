# TURN/STUN server for GandolaChat WebRTC calls.
#
# Why: without a TURN relay, two devices behind symmetric NATs (typical
# mobile carriers / home routers) can't establish a direct peer connection.
# The ICE handshake gets stuck at "checking" → "disconnected" → fails.
# coturn relays the media stream through the VPS so calls always work.
#
# The container runs with network_mode: host so the source IP of UDP
# packets matches the VPS's public IP — without that, ICE candidates
# advertise the docker bridge IP and clients can't reach them.

# Authentication. Long-term credentials, matches the client config in
# client/src/renderer/services/webrtc.ts and mobile/src/services/webrtc.ts.
lt-cred-mech
user=gandola:gandolapass

# Realm — anything stable. Used in DIGEST auth, not user-visible.
realm=gandola.chat

# Ports.
listening-port=3478
# Allocation port range. Narrow on purpose so we can punch a small hole
# through the VPS firewall (UDP 49160-49200) instead of opening 16k ports.
min-port=49160
max-port=49200

# Tell coturn its public IP. WITHOUT THIS, allocated relay candidates
# advertise the container's internal IP and the other peer can't reach them.
# Replace 2.26.117.77 with the VPS's actual public IP if it ever changes.
external-ip=2.26.117.77

# Performance / safety knobs.
fingerprint
no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1
# TLS is intentionally OFF here — TURN over plain UDP/TCP is enough for
# audio/video relay; the SDP exchange that carries TURN creds already goes
# over WSS (well, WS — see below) once we put the server behind nginx+TLS.
no-tls
no-dtls

# Stay quiet by default; bump to verbose only when debugging via
# `docker compose logs coturn`.
log-file=stdout
simple-log
