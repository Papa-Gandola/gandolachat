services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: gandola
      POSTGRES_PASSWORD: gandola
      POSTGRES_DB: gandolachat
    # Internal-only: only the server container talks to Postgres over the
    # docker network. No public port — removes a brute-force surface.
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gandola -d gandolachat"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    restart: always
    # TRANSITIONAL: published on all interfaces so existing desktop / APK
    # clients (built against http://2.26.117.77:8000) keep working while
    # they're migrated to the HTTPS endpoint. nginx also proxies
    # https://2-26-117-77.sslip.io -> localhost:8000.
    #
    # Once every client is rebuilt against https://2-26-117-77.sslip.io,
    # lock this down to "127.0.0.1:8000:8000" so the raw HTTP port is no
    # longer reachable from the public internet (all external traffic then
    # goes through nginx/TLS only).
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://gandola:gandola@db:5432/gandolachat
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production-please}"
    volumes:
      - uploads:/app/uploads
      # Bind-mount the web PWA bundle from the host so deploying a new build
      # is just `scp` of fresh files — no image rebuild needed.
      - ./server/web:/app/web
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
