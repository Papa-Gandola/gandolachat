services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: gandola
      POSTGRES_PASSWORD: gandola
      POSTGRES_DB: gandolachat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gandola -d gandolachat"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://gandola:gandola@db:5432/gandolachat
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production-please}"
    volumes:
      - uploads:/app/uploads
      # Bind-mount the web PWA bundle from the host so deploying a new build
      # is just `scp` of fresh files — no image rebuild needed. The server
      # reads from /app/web on every request via StaticFiles.
      - ./server/web:/app/web
    depends_on:
      db:
        condition: service_healthy

  # TURN/STUN relay so WebRTC calls work between devices behind NAT.
  # Runs in host network mode so coturn sees real source IPs on UDP — without
  # this, ICE candidates would advertise the docker bridge address and the
  # remote peer wouldn't be able to reach the relay. Don't forget to open
  # UDP 3478 + UDP 49160-49200 + TCP 3478 in the VPS firewall (ufw/iptables).
  coturn:
    image: coturn/coturn:4.6
    restart: always
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: ["-c", "/etc/coturn/turnserver.conf"]

volumes:
  pgdata:
  uploads:
