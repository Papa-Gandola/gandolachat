version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: gandola
      POSTGRES_PASSWORD: gandola
      POSTGRES_DB: gandolachat
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gandola"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://gandola:gandola@db:5432/gandolachat
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production-please}"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
