services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: gandola
      POSTGRES_PASSWORD: gandola
      POSTGRES_DB: gandolachat
    # Postgres no longer needs to be reachable from outside the host —
    # only the FastAPI container talks to it on the internal docker
    # network. Closing the public port removes a brute-force surface.
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gandola -d gandolachat"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    restart: always
    # No host port — all external traffic goes through caddy on 443.
    # The container still listens on 8000 internally; caddy reverse-proxies
    # to it via the docker network.
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://gandola:gandola@db:5432/gandolachat
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production-please}"
    volumes:
      - uploads:/app/uploads
      # Bind-mount the web PWA bundle from the host so deploying a new build
      # is just `scp` of fresh files — no image rebuild needed. The server
      # reads from /app/web on every request via StaticFiles.
      - ./server/web:/app/web
    depends_on:
      db:
        condition: service_healthy

  # HTTPS reverse proxy. Terminates TLS for the public hostname (DOMAIN env
  # var, e.g. yourname.duckdns.org), auto-renews the Let's Encrypt cert, and
  # forwards everything (API, WS, /uploads, /app PWA) to the server container.
  # ACME challenge needs ports 80 and 443 reachable from the public internet.
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Persist issued certs + ACME account state across restarts — without
      # this, every `docker compose down/up` would re-issue and hit LE rate
      # limits (5 certs/week per FQDN).
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: "${DOMAIN}"
      ACME_EMAIL: "${ACME_EMAIL:-}"
    depends_on:
      - server

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
