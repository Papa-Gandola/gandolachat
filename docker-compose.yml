services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: gandola
      POSTGRES_PASSWORD: gandola
      POSTGRES_DB: gandolachat
    # Internal-only: only the server container talks to Postgres over the
    # docker network. No public port — removes a brute-force surface.
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gandola -d gandolachat"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    restart: always
    # Loopback-only: only the host's nginx reaches the server, over
    # localhost. nginx holds the Let's Encrypt cert and reverse-proxies
    # https://2-26-117-77.sslip.io -> localhost:8000. The raw HTTP port is
    # NOT reachable from the public internet, so all external traffic is
    # forced through TLS. Every client must use https:// + wss://.
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://gandola:gandola@db:5432/gandolachat
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production-please}"
      # Web Push (VAPID). Empty unless set in the host .env — web push then
      # stays disabled and the server logs nothing. See .env.example.
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      VAPID_SUBJECT: "${VAPID_SUBJECT:-mailto:admin@gandola.chat}"
    volumes:
      - uploads:/app/uploads
      # Bind-mount the web PWA bundle from the host so deploying a new build
      # is just `scp` of fresh files — no image rebuild needed.
      - ./server/web:/app/web
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
